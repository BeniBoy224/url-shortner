services:
  migrate:
    build: .
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: on-failure

  app:
    build: .
    ports:
      - "127.0.0.1:3010:3010"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
